<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动目录 - SJTU Programming Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            margin: auto;
            max-width: 1200px;
            min-height: 100vh;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto 1fr auto;
            grid-template-areas:
                "heading logo"
                "top-nav top-nav"
                "article article"
                "footer footer";
            gap: 20px;
            padding: 20px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
        }

        /* ===== HEADER & LOGO ===== */
        header {
            border-radius: 10px;
            background-color: #AD1730;
            grid-area: heading;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            grid-area: logo;
            display: flex;
            justify-content: flex-end;
        }

        .logo img {
            max-height: 100px;
            width: auto;
            border-radius: 10px;
        }

        /* ===== NAVIGATION ===== */
        .top-nav {
            grid-area: top-nav;
            background-color: #AD1730;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            gap: 20px;
        }

        .top-nav a {
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            transition: all 0.3s ease;
            color: white;
            border-radius: 25px;
        }

        .top-nav a:hover {
            background-color: #002B60;
            color: white;
            transform: translateY(-5px);
        }

        /* ===== ARTICLE ===== */
        article {
            grid-area: article;
            background-color: #002B60;
            border-radius: 10px;
            padding: 30px;
            color: white;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        article h1 {
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        article h2 {
            color: #FFD700;
            margin: 25px 0 15px;
            font-size: 1.3rem;
        }

        /* ===== EVENT LIST ===== */
        .event-list {
            list-style: none;
        }

        .event-item {
            background-color: #AD1730;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .event-item:hover {
            background-color: #002B60;
            transform: translateY(-2px);
        }

        .event-item a {
            text-decoration: none;
            color: #FFD700;
        }

        .event-item a:hover {
            text-decoration: underline;
        }

        .event-item h3 {
            color: white;
            text-align: center;
        }

        .event-item img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        footer {
            grid-area: footer;
            background-color: #AD1730;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
        <header>
            <h1>编程社团 - SJTU Programming Club - 学期2025-2026</h1>
        </header>

        <div class="logo">
            <a href="../index.html" aria-label="Home page">
                <img src="../images/Sjtu-logo-standard-red.png" alt="SJTU logo" height="100">
            </a>
        </div>

        <nav class="top-nav" aria-label="Main navigation">
            
            
            <a href="../documentations.html">摄影/视频</a>
            
        </nav>

        <article>
            <h1>节目目录 - Events List</h1>

            <ul class="event-list">
                <li class="event-item">
                    <a href="spellingbee.html">
                        <h3>Spelling Bee Competition</h3>
                    </a>
                </li>
                <li class="event-item">
                    <a href="firstdayofcoding.html">
                        <h3>Coding Club - First Day</h3>
                    </a>
                </li>
                <li class="event-item">
                    <h3>More events coming soon...</h3>
                </li>
            </ul>
        </article>

        <footer>
            Copyright ©2026 SJTU Pre Uni. All rights reserved.
        </footer>
</body>
</html>
